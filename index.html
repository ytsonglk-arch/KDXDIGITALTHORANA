<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Vesak Thorana 2026</title>
    <style>
        body {
            background-color: #030303;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h2 {
            color: #ffcc00;
            text-shadow: 0 0 10px #ff6600;
            margin-bottom: 5px;
            font-size: 24px;
        }

        /* Thorana Main Frame */
        .thorana-box {
            position: relative;
            width: 900px;
            height: 675px;
            box-shadow: 0 0 50px rgba(255, 102, 0, 0.3);
            border-radius: 10px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Thorana Image Background */
        .thorana-bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        /* Light Bulbs Base Styling */
        .bulb {
            position: absolute;
            border-radius: 50%;
            z-index: 3;
            width: 8px;
            height: 8px;
            mix-blend-mode: screen;
            opacity: 0;
        }

        /* Animations for realistic lighting */
        @keyframes flash-red {
            0%, 100% { opacity: 0; background: transparent; box-shadow: none; }
            50% { opacity: 1; background: #ff0055; box-shadow: 0 0 12px #ff0055, 0 0 20px #ff0000; }
        }

        @keyframes flash-yellow {
            0%, 100% { opacity: 1; background: #ffcc00; box-shadow: 0 0 12px #ffcc00, 0 0 20px #ffaa00; }
            50% { opacity: 0; background: transparent; box-shadow: none; }
        }

        @keyframes flash-blue {
            0%, 50%, 100% { opacity: 0; }
            25%, 75% { opacity: 1; background: #00ccff; box-shadow: 0 0 12px #00ccff, 0 0 20px #0000ff; }
        }

        @keyframes flash-green {
            0%, 100% { opacity: 0.3; background: #00ff66; box-shadow: 0 0 5px #00ff66; }
            50% { opacity: 1; background: #00ff66; box-shadow: 0 0 15px #00ff66, 0 0 25px #00ff00; }
        }

        /* --- Bulb Positions --- */
        /* Center Circle Lights (Chaser effect) */
        .c1 { top: 31%; left: 50%; animation: flash-red 0.8s infinite 0.1s; }
        .c2 { top: 34%; left: 59%; animation: flash-yellow 0.8s infinite 0.2s; }
        .c3 { top: 43%; left: 63%; animation: flash-blue 0.8s infinite 0.3s; }
        .c4 { top: 52%; left: 59%; animation: flash-red 0.8s infinite 0.4s; }
        .c5 { top: 55%; left: 50%; animation: flash-yellow 0.8s infinite 0.5s; }
        .c6 { top: 52%; left: 41%; animation: flash-blue 0.8s infinite 0.6s; }
        .c7 { top: 43%; left: 37%; animation: flash-red 0.8s infinite 0.7s; }
        .c8 { top: 34%; left: 41%; animation: flash-yellow 0.8s infinite 0.8s; }

        /* Jathaka Katha Pictures Highlights */
        .p1 { top: 12%; left: 41%; width: 10px; height: 10px; animation: flash-green 1.2s infinite; }
        .p2 { top: 12%; left: 59%; width: 10px; height: 10px; animation: flash-green 1.2s infinite 0.2s; }
        .p3 { top: 31%; left: 26%; width: 10px; height: 10px; animation: flash-green 1.2s infinite 0.4s; }
        .p4 { top: 31%; left: 74%; width: 10px; height: 10px; animation: flash-green 1.2s infinite 0.6s; }
        .p5 { top: 51%; left: 26%; width: 10px; height: 10px; animation: flash-green 1.2s infinite 0.8s; }
        .p6 { top: 51%; left: 74%; width: 10px; height: 10px; animation: flash-green 1.2s infinite 1.0s; }

        /* Outer Border Arch Lights */
        .o1 { top: 5%; left: 50%; animation: flash-red 0.5s infinite; }
        .o2 { top: 8%; left: 33%; animation: flash-yellow 0.5s infinite 0.1s; }
        .o3 { top: 8%; left: 67%; animation: flash-blue 0.5s infinite 0.2s; }
        .o4 { top: 21%; left: 18%; animation: flash-red 0.5s infinite 0.3s; }
        .o5 { top: 21%; left: 82%; animation: flash-yellow 0.5s infinite 0.4s; }
        .o6 { top: 42%; left: 11%; animation: flash-blue 0.5s infinite 0.5s; }
        .o7 { top: 42%; left: 89%; animation: flash-red 0.5s infinite 0.6s; }

        /* Bottom Boarder */
        .b1 { bottom: 21%; left: 20%; animation: flash-yellow 0.4s infinite; }
        .b2 { bottom: 21%; left: 50%; animation: flash-red 0.4s infinite 0.2s; }
        .b3 { bottom: 21%; left: 80%; animation: flash-blue 0.4s infinite 0.4s; }

        /* Audio Panel Style */
        .audio-panel {
            margin-top: 20px;
            background: #222;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #ffcc00;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h2>ඩිජිටල් වෙසක් තොරණ සන්දර්ශනය</h2>

    <div class="thorana-box">
        <!-- Image direct link layout to ensure it works on GitHub Pages -->
        <img src="https://raw.githubusercontent.com/ytsonglk-arch/KDXDIGITALTHORANA/main/9352470180_1c03bb86dd_c_2.jpg" 
             onerror="this.src='9352470180_1c03bb86dd_c_2.jpg'" 
             alt="9352470180_1c03bb86dd_c_2.jpg" class="thorana-bg">
        
        <!-- Center Mandala Lights -->
        <div class="bulb c1"></div><div class="bulb c2"></div>
        <div class="bulb c3"></div><div class="bulb c4"></div>
        <div class="bulb c5"></div><div class="bulb c6"></div>
        <div class="bulb c7"></div><div class="bulb c8"></div>

        <!-- Jathaka Katha Frame Lights -->
        <div class="bulb p1"></div><div class="bulb p2"></div>
        <div class="bulb p3"></div><div class="bulb p4"></div>
        <div class="bulb p5"></div><div class="bulb p6"></div>

        <!-- Outer Border Lights -->
        <div class="bulb o1"></div><div class="bulb o2"></div>
        <div class="bulb o3"></div><div class="bulb o4"></div>
        <div class="bulb o5"></div><div class="bulb o6"></div>
        <div class="bulb o7"></div>

        <!-- Bottom Panel Lights -->
        <div class="bulb b1"></div><div class="bulb b2"></div><div class="bulb b3"></div>
    </div>

    <!-- Background Music Player -->
    <div class="audio-panel">
        <audio controls autoplay loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

</body>
</html>
