<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Vesak Thorana 2026 - KDX Team Edition</title>
    <style>
        body {
            background-color: #050505;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }

        /* Thorana Frame Wrapper */
        .thorana-wrapper {
            position: relative;
            width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Thorana Main Container */
        .thorana-box {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(255, 153, 0, 0.2);
        }

        .thorana-bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            position: relative;
        }

        /* Interactive Audio Controller Panel (FOS Media Style) */
        .audio-panel {
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #ffcc00;
            border-radius: 30px;
            padding: 10px 25px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            z-index: 10;
        }

        .audio-btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .audio-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px #ffcc00;
            transform: scale(1.05);
        }

        .status-text {
            font-size: 13px;
            color: #ffcc00;
            letter-spacing: 1px;
        }

        /* Light Bulb Base */
        .bulb {
            position: absolute;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: screen;
            width: 5px;
            height: 5px;
        }

        /* --- Advanced Chaser Circuits Animations --- */
        @keyframes pattern-one {
            0%, 100% { background: #ff0055; box-shadow: 0 0 10px #ff0055, 0 0 18px #ff0000; opacity: 1; }
            50% { background: transparent; box-shadow: none; opacity: 0.1; }
        }

        @keyframes pattern-two {
            0%, 100% { background: transparent; box-shadow: none; opacity: 0.1; }
            50% { background: #ffcc00; box-shadow: 0 0 10px #ffcc00, 0 0 18px #ffaa00; opacity: 1; }
        }

        @keyframes pattern-three {
            0%, 33% { background: #00ccff; box-shadow: 0 0 10px #00ccff, 0 0 18px #0000ff; opacity: 1; }
            34%, 100% { background: transparent; box-shadow: none; opacity: 0.1; }
        }

        @keyframes pattern-four {
            0%, 50% { opacity: 0.1; background: transparent; }
            75% { background: #00ff66; box-shadow: 0 0 12px #00ff66, 0 0 20px #00ff00; opacity: 1; }
        }

        /* Bottom Credits Footer */
        .footer-bar {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            margin-top: 5px;
        }

        .kdx-team {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            animation: kdx-neon 2.5s infinite ease-in-out;
        }

        @keyframes kdx-neon {
            0%, 100% { text-shadow: 0 0 10px #ff0055, 0 0 25px #ff0000, 0 0 40px #ff0055; color: #fff; }
            50% { text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ccff, 0 0 50px #00ffcc; color: #ffcc00; }
        }
    </style>
</head>
<body>

    <div class="thorana-wrapper">
        <!-- Audio Management System (FOS Media Style) -->
        <div class="audio-panel">
            <button class="audio-btn" id="playBtn" onclick="toggleAudio()">Play Audio 📻</button>
            <div class="status-text" id="statusText">AUDIO: PAUSED</div>
        </div>

        <!-- Hidden Audio Element: ඕනෑම බෞද්ධ භක්ති ගීතයක හෝ පිරිත් ලින්ක් එකක් මෙතන src එකට දාන්න පුළුවන් -->
        <audio id="thoranaAudio" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

        <!-- Thorana Container -->
        <div class="thorana-box" id="thoranaBox">
            <!-- 100% Fixed Raw Link -->
            <img src="https://raw.githubusercontent.com/ytsonglk-arch/kdxthorana/main/9352470180_1c03bb86dd_c.jpg" 
                 onerror="this.src='9352470180_1c03bb86dd_c.jpg';"
                 alt="Digital Vesak Thorana" class="thorana-bg">
        </div>

        <!-- Powered By KDX Team Premium Footer -->
        <div class="footer-bar">
            <div class="kdx-team">⚡ POWERED BY KDX TEAM ⚡</div>
        </div>
    </div>

    <!-- Script generating 1500+ multi-pattern chaser lights -->
    <script>
        const box = document.getElementById('thoranaBox');
        const audio = document.getElementById('thoranaAudio');
        const playBtn = document.getElementById('playBtn');
        const statusText = document.getElementById('statusText');

        // Audio Interactive Controls
        function toggleAudio() {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = "Pause Audio ⏸️";
                    statusText.innerText = "AUDIO: PLAYING NOW";
                    statusText.style.color = "#00ff66";
                }).catch(err => {
                    alert("Click again to allow audio playback!");
                });
            } else {
                audio.pause();
                playBtn.innerText = "Play Audio 📻";
                statusText.innerText = "AUDIO: PAUSED";
                statusText.style.color = "#ffcc00";
            }
        }
        
        // Dynamic Bulb Matrix Generators
        function createCirclePattern(centerX, centerY, radius, count, animModulo, shift, size=5) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 2 * Math.PI;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                
                const bulb = document.createElement('div');
                bulb.className = 'bulb';
                bulb.style.left = `${x}%`;
                bulb.style.top = `${y}%`;
                bulb.style.width = `${size}px`;
                bulb.style.height = `${size}px`;
                
                const styles = ['pattern-one', 'pattern-two', 'pattern-three', 'pattern-four'];
                const assigned = styles[(i + shift) % animModulo];
                bulb.style.animation = `${assigned} 0.4s infinite ${i * 0.01}s`;
                box.appendChild(bulb);
            }
        }

        function createCurvePattern(startY, startX, width, height, count, shift, speed=0.4) {
            for(let i=0; i<count; i++) {
                const pct = i / count;
                const x = startX + (pct * width);
                const y = startY - (height * Math.sin(pct * Math.PI));
                
                const bulb = document.createElement('div');
                bulb.className = 'bulb';
                bulb.style.left = `${x}%`;
                bulb.style.top = `${y}%`;
                
                const styles = ['pattern-two', 'pattern-one', 'pattern-three', 'pattern-four'];
                bulb.style.animation = `${styles[i % 4]} ${speed}s infinite ${i * 0.012}s`;
                box.appendChild(bulb);
            }
        }

        // --- Bulbs Deployment (1500+ Bulbs Total) ---
        
        // 1. Center Buddha Aura Rings (බුදුරැස් වළලු 6ක්)
        for(let r=10; r<=20; r+=2) {
            createCirclePattern(50, 44, r, r*4, 4, r);
        }

        // 2. Picture Panels Overlays (ජාතක කථා පින්තූර 6 වටා ඝන ලයිට් වැල්)
        const frameCoordinates = [
            {x: 41, y: 19}, {x: 59, y: 19},
            {x: 29, y: 32}, {x: 71, y: 32},
            {x: 29, y: 53}, {x: 71, y: 53}
        ];
        frameCoordinates.forEach((coord, index) => {
            createCirclePattern(coord.x, coord.y, 5.8, 26, 3, index, 4);
            createCirclePattern(coord.x, coord.y, 6.8, 32, 3, index+1, 4);
        });

        // 3. Huge Outer Edge Arches (තොරණ වටේම යන ලොකුම රන් වැල් 5ක්)
        createCurvePattern(41, 14, 72, 38, 80, 0, 0.35);
        createCurvePattern(43, 12, 76, 40, 95, 1, 0.35);
        createCurvePattern(45, 10, 80, 42, 110, 2, 0.35);
        createCurvePattern(47, 8, 84, 45, 120, 3, 0.35);
        createCurvePattern(49, 6, 88, 48, 130, 4, 0.35);
        
        // 4. Bottom Information Panel Chaser Borders
        for(let x = 16; x <= 84; x += 0.8) {
            // Line 1
            let b1 = document.createElement('div'); b1.className = 'bulb'; b1.style.left = `${x}%`; b1.style.top = `75%`;
            b1.style.animation = `pattern-one 0.4s infinite ${(x%4)*0.05}s`; box.appendChild(b1);
            // Line 2
            let b2 = document.createElement('div'); b2.className = 'bulb'; b2.style.left = `${x}%`; b2.style.top = `76.5%`;
            b2.style.animation = `pattern-three 0.4s infinite ${(x%4)*0.05}s`; box.appendChild(b2);
            // Line 3
            let b3 = document.createElement('div'); b3.className = 'bulb'; b3.style.left = `${x}%`; b3.style.top = `91%`;
            b3.style.animation = `pattern-two 0.4s infinite ${(x%4)*0.05}s`; box.appendChild(b3);
        }
    </script>
</body>
</html>
