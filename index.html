<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>KDX Team | Digital Vesak Thorana</title>

  <meta name="description" content="KDX Team Digital Vesak Thorana 2026">

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="stars"></div>

<header>

  <div class="logo-area">
    <h1 class="logo glow-text">KDX TEAM</h1>
    <p class="tagline">Digital Vesak Thorana 2026</p>
  </div>

</header>

<section class="thorana-section">

  <div class="thorana">

    <!-- LED Rings -->

    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>

    <!-- Decorative Bulbs -->

    <div class="bulb bulb1"></div>
    <div class="bulb bulb2"></div>
    <div class="bulb bulb3"></div>
    <div class="bulb bulb4"></div>
    <div class="bulb bulb5"></div>
    <div class="bulb bulb6"></div>

    <!-- Story Frame -->

    <div class="story-frame">

      <div class="slide active">

        <img src="assets/images/slide1.jpg" alt="Slide 1">

        <div class="caption">
          <h2>බුදු දහමේ ආලෝකය</h2>

          <p>
            කරුණාව, මෛත්‍රිය සහ සදාචාරය තුළින්
            ලෝකය ආලෝකවත් කරමු.
          </p>
        </div>

      </div>

      <div class="slide">

        <img src="assets/images/slide2.jpg" alt="Slide 2">

        <div class="caption">
          <h2>මෛත්‍රියේ බලය</h2>

          <p>
            වෛරය වෛරයෙන් නොව,
            ආදරයෙන් පමණක් නිවෙයි.
          </p>
        </div>

      </div>

      <div class="slide">

        <img src="assets/images/slide3.jpg" alt="Slide 3">

        <div class="caption">
          <h2>සදාචාරයේ මග</h2>

          <p>
            සත්‍යය හා යහපත
            මිනිසාගේ සැබෑ ශක්තියයි.
          </p>
        </div>

      </div>

    </div>

    <!-- Controls -->

    <div class="controls">

      <button onclick="prevSlide()">⮜</button>
      <button onclick="nextSlide()">⮞</button>

    </div>

  </div>

</section>

<footer>

  <p>
    © 2026 KDX Team | All Rights Reserved
  </p>

</footer>

<!-- Background Audio -->

<audio autoplay loop id="bgMusic">

  <source src="assets/audio/vesak.mp3" type="audio/mp3">

</audio>

<!-- Music Button -->

<button class="music-btn" onclick="toggleMusic()">

  🔊

</button>

<script src="script.js"></script>

</body>
</html>
