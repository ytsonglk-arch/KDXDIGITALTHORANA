<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Vesak Thorana 2026 - KDX Team</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }

        /* Main Screen Container */
        .thorana-wrapper {
            position: relative;
            width: 800px;
            height: 720px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* Thorana Box Frame */
        .thorana-box {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
        }

        /* Thorana Background Image */
        .thorana-bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            position: relative;
        }

        /* Bulb Standard Styling */
        .bulb {
            position: absolute;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0;
            width: 5px;
            height: 5px;
        }

        /* --- High-Density Chaser Patterns --- */
        @keyframes pattern-red {
            0%, 100% { opacity: 1; background: #ff0055; box-shadow: 0 0 8px #ff0055, 0 0 15px #ff0000; }
            50% { opacity: 0.1; background: transparent; box-shadow: none; }
        }

        @keyframes pattern-yellow {
            0%, 100% { opacity: 0.1; background: transparent; box-shadow: none; }
            50% { opacity: 1; background: #ffcc00; box-shadow: 0 0 8px #ffcc00, 0 0 15px #ffaa00; }
        }

        @keyframes pattern-blue {
            0%, 33% { opacity: 1; background: #00ccff; box-shadow: 0 0 8px #00ccff, 0 0 15px #0000ff; }
            34%, 100% { opacity: 0.1; background: transparent; box-shadow: none; }
        }

        @keyframes pattern-green {
            0%, 50% { opacity: 0.1; }
            75% { opacity: 1; background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 18px #00ff00; }
        }

        /* Bottom Footer Bar Styling */
        .footer-bar {
            width: 100%;
            text-align: center;
            padding: 15px 0;
            z-index: 5;
            background: linear-gradient(90deg, transparent, #111, transparent);
        }

        .kdx-team {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #ffcc00;
            text-transform: uppercase;
            text-shadow: 0 0 8px #ff3300, 0 0 20px #ff6600;
            animation: team-glow 2s infinite ease-in-out;
        }

        @keyframes team-glow {
            0%, 100% { text-shadow: 0 0 8px #ff3300, 0 0 20px #ff6600; color: #ffcc00; }
            50% { text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ccff; color: #ffffff; }
        }
    </style>
</head>
<body>

    <div class="thorana-wrapper">
        <!-- Thorana Display -->
        <div class="thorana-box" id="thoranaBox">
            <!-- GitHub Raw Content එක හරහා පින්තූරය 100% ක්ම ලෝඩ් වන නිවැරදිම ලින්ක් එක -->
            <img src="https://raw.githubusercontent.com/ytsonglk-arch/kdxthorana/main/9352470180_1c03bb86dd_c.jpg" 
                 onerror="this.src='9352470180_1c03bb86dd_c.jpg';"
                 alt="Vesak Thorana" class="thorana-bg">
        </div>

        <!-- Footer Credits -->
        <div class="footer-bar">
            <div class="kdx-team">⚡ Powered by KDX Team ⚡</div>
        </div>
    </div>

    <!-- JavaScript to automatically generate thousands of changing light circuits -->
    <script>
        const box = document.getElementById('thoranaBox');
        
        // Function to create rings of lights (බුදුරැස් සහ පින්තූර වටා)
        function createChaserCircle(centerX, centerY, radius, count, animType, delayOffset, bSize = 5) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 2 * Math.PI;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                
                const bulb = document.createElement('div');
                bulb.className = 'bulb';
                bulb.style.left = `${x}%`;
                bulb.style.top = `${y}%`;
                bulb.style.width = `${bSize}px`;
                bulb.style.height = `${bSize}px`;
                
                const anims = ['pattern-red', 'pattern-yellow', 'pattern-blue', 'pattern-green'];
                const selectedAnim = anims[(i + delayOffset) % animType];
                const speed = 0.35 + ((i % 3) * 0.05);
                
                bulb.style.animation = `${selectedAnim} ${speed}s infinite`;
                box.appendChild(bulb);
            }
        }

        // Function to create massive arch light curves
        function createArchLights(startY, startX, width, height, count, delay, speedMultiplier = 0.5) {
            for(let i=0; i<count; i++) {
                const pct = i / count;
                const x = startX + (pct * width);
                const y = startY - (height * Math.sin(pct * Math.PI));
                
                const bulb = document.createElement('div');
                bulb.className = 'bulb';
                bulb.style.left = `${x}%`;
                bulb.style.top = `${y}%`;
                
                const anims = ['pattern-yellow', 'pattern-red', 'pattern-blue', 'pattern-green'];
                // Creates a running wave effect (Chaser loop)
                bulb.style.animation = `${anims[i % 4]} ${speedMultiplier}s infinite ${i * 0.015}s`;
                box.appendChild(bulb);
            }
        }

        // 1. Center Buddha Aura Rays - බුදුරැස් මාලාව (දැන් බුබුළු වළලු 5ක්ම තියෙනවා)
        createChaserCircle(50, 44, 11, 40, 4, 0);
        createChaserCircle(50, 44, 13, 50, 4, 1);
        createChaserCircle(50, 44, 15, 60, 4, 2);
        createChaserCircle(50, 44, 17, 70, 4, 3);
        createChaserCircle(50, 44, 19, 80, 4, 4);

        // 2. Jathaka Katha Picture Frames (පින්තූර 6 වටා ඝනකමට බුබුළු වැල්)
        const frames = [
            {x: 41, y: 19}, {x: 59, y: 19},
            {x: 29, y: 32}, {x: 71, y: 32},
            {x: 29, y: 53}, {x: 71, y: 53}
        ];
        
        frames.forEach((f, idx) => {
            createChaserCircle(f.x, f.y, 6, 30, 3, idx, 4);
            createChaserCircle(f.x, f.y, 7, 35, 3, idx + 1, 4);
        });

        // 3. Main Outer Border Arch - පිටත මල් කැටයම් (බුබුළු වැල් 4ක් එක පිට එක දුවනවා)
        createArchLights(43, 12, 76, 40, 90, 0, 0.4);
        createArchLights(45, 10, 80, 42, 100, 0.1, 0.4);
        createArchLights(47, 8, 84, 45, 110, 0.2, 0.4);
        createArchLights(49, 6, 88, 48, 120, 0.3, 0.4);
        
        // 4. Bottom Yellow Display Panel Border (පහළ බෝඩ් එක වටා බුබුළු සිය ගණනක්)
        for(let x = 16; x <= 84; x += 1.0) {
            // Top border line
            let b1 = document.createElement('div'); b1.className = 'bulb'; b1.style.left = `${x}%`; b1.style.top = `75%`;
            b1.style.animation = `pattern-red 0.5s infinite ${(x%4)*0.08}s`; box.appendChild(b1);
            
            // Middle border line
            let b2 = document.createElement('div'); b2.className = 'bulb'; b2.style.left = `${x}%`; b2.style.top = `76.5%`;
            b2.style.animation = `pattern-blue 0.5s infinite ${(x%4)*0.08}s`; box.appendChild(b2);

            // Bottom border line
            let b3 = document.createElement('div'); b3.className = 'bulb'; b3.style.left = `${x}%`; b3.style.top = `91%`;
            b3.style.animation = `pattern-yellow 0.5s infinite ${(x%4)*0.08}s`; box.appendChild(b3);
        }
    </script>
</body>
</html>
