<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Vesak Thorana 2026 - KDX Team</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }

        /* Main Screen Container */
        .thorana-wrapper {
            position: relative;
            width: 800px;
            height: 700px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        /* Thorana Box Frame */
        .thorana-box {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
        }

        /* Thorana Background Image */
        .thorana-bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            position: relative;
        }

        /* Bulb Standard Styling */
        .bulb {
            position: absolute;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0;
            width: 6px;
            height: 6px;
        }

        /* --- Realistic Digital Thorana Lighting Patterns --- */
        @keyframes pattern-red {
            0%, 100% { opacity: 1; background: #ff0055; box-shadow: 0 0 8px #ff0055, 0 0 15px #ff0000; }
            50% { opacity: 0.2; background: transparent; box-shadow: none; }
        }

        @keyframes pattern-yellow {
            0%, 100% { opacity: 0.2; background: transparent; box-shadow: none; }
            50% { opacity: 1; background: #ffcc00; box-shadow: 0 0 8px #ffcc00, 0 0 15px #ffaa00; }
        }

        @keyframes pattern-blue {
            0%, 33% { opacity: 1; background: #00ccff; box-shadow: 0 0 8px #00ccff, 0 0 15px #0000ff; }
            34%, 100% { opacity: 0.2; background: transparent; box-shadow: none; }
        }

        @keyframes pattern-green {
            0%, 50% { opacity: 0.1; }
            75% { opacity: 1; background: #00ff66; box-shadow: 0 0 10px #00ff66, 0 0 18px #00ff00; }
        }

        /* Bottom Footer Bar Styling */
        .footer-bar {
            width: 100%;
            text-align: center;
            padding: 15px 0;
            z-index: 5;
            background: linear-gradient(90deg, transparent, #111, transparent);
        }

        .kdx-team {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffcc00;
            text-transform: uppercase;
            text-shadow: 0 0 8px #ff3300, 0 0 20px #ff6600;
            animation: team-glow 2s infinite ease-in-out;
        }

        @keyframes team-glow {
            0%, 100% { text-shadow: 0 0 8px #ff3300, 0 0 20px #ff6600; color: #ffcc00; }
            50% { text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ccff; color: #ffffff; }
        }
    </style>
</head>
<body>

    <div class="thorana-wrapper">
        <!-- Thorana Display -->
        <div class="thorana-box" id="thoranaBox">
            <!-- අන්තර්ජාලයෙන් සෘජුවම රූපය ලබාගන්නා ස්ථිර ලින්ක් එක (Imgur CDN) -->
            <img src="https://i.imgur.com/gK6T6S5.jpg" alt="Vesak Thorana" class="thorana-bg">
        </div>

        <!-- Footer Credits Requested by User -->
        <div class="footer-bar">
            <div class="kdx-team">⚡ Powered by KDX Team ⚡</div>
        </div>
    </div>

    <!-- JavaScript to automatically generate thousands of changing light circuits -->
    <script>
        const box = document.getElementById('thoranaBox');
        
        function createChaserCircle(centerX, centerY, radius, count, animType, delayOffset) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 2 * Math.PI;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                
                const bulb = document.createElement('div');
                bulb.className = 'bulb';
                bulb.style.left = `${x}%`;
                bulb.style.top = `${y}%`;
                
                const anims = ['pattern-red', 'pattern-yellow', 'pattern-blue', 'pattern-green'];
                const selectedAnim = anims[(i + delayOffset) % animType];
                const speed = 0.4 + ((i % 3) * 0.1);
                
                bulb.style.animation = `${selectedAnim} ${speed}s infinite`;
                box.appendChild(bulb);
            }
        }

        function createArchLights(startY, startX, width, height, count, delay) {
            for(let i=0; i<count; i++) {
                const pct = i / count;
                const x = startX + (pct * width);
                const y = startY - (height * Math.sin(pct * Math.PI));
                
                const bulb = document.createElement('div');
                bulb.className = 'bulb';
                bulb.style.left = `${x}%`;
                bulb.style.top = `${y}%`;
                
                const anims = ['pattern-yellow', 'pattern-red', 'pattern-blue'];
                bulb.style.animation = `${anims[i % 3]} 0.5s infinite ${i * 0.02}s`;
                box.appendChild(bulb);
            }
        }

        // 1. Center Buddha Aura Rays
        createChaserCircle(50, 44, 13, 45, 3, 0);
        createChaserCircle(50, 44, 15, 55, 4, 1);
        createChaserCircle(50, 44, 17, 65, 3, 2);

        // 2. Jathaka Katha Picture Frames
        const frames = [
            {x: 41, y: 19}, {x: 59, y: 19},
            {x: 29, y: 32}, {x: 71, y: 32},
            {x: 29, y: 53}, {x: 71, y: 53}
        ];
        
        frames.forEach((f, idx) => {
            createChaserCircle(f.x, f.y, 6, 24, 2, idx);
        });

        // 3. Main Outer Border Arch
        createArchLights(45, 10, 80, 42, 80, 0);
        createArchLights(47, 8, 84, 45, 90, 1);
        
        // 4. Bottom Panel Border
        for(let x = 16; x <= 84; x += 1.5) {
            let b1 = document.createElement('div'); b1.className = 'bulb'; b1.style.left = `${x}%`; b1.style.top = `75%`;
            b1.style.animation = `pattern-red 0.6s infinite ${(x%3)*0.1}s`; box.appendChild(b1);
            
            let b2 = document.createElement('div'); b2.className = 'bulb'; b2.style.left = `${x}%`; b2.style.top = `91%`;
            b2.style.animation = `pattern-yellow 0.6s infinite ${(x%3)*0.1}s`; box.appendChild(b2);
        }
    </script>
</body>
</html>
