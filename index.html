<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Vesak Thorana 2026</title>
    <style>
        body {
            background-color: #030303;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        h2 {
            color: #ffcc00;
            text-shadow: 0 0 10px #ff6600;
            margin-bottom: 15px;
            font-size: 24px;
        }

        /* Thorana Main Frame */
        .thorana-box {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 50px rgba(255, 102, 0, 0.3);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Thorana Image Background */
        .thorana-bg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        /* Light Bulbs Base Styling */
        .bulb {
            position: absolute;
            border-radius: 50%;
            z-index: 3;
            width: 8px;
            height: 8px;
            mix-blend-mode: screen;
        }

        /* Animations for realistic lighting */
        @keyframes flow-1 {
            0%, 100% { background: #ff0055; box-shadow: 0 0 12px #ff0055, 0 0 20px #ff0000; opacity: 1; }
            33% { background: #ffcc00; box-shadow: 0 0 12px #ffcc00, 0 0 20px #ffaa00; opacity: 1; }
            66% { background: #00ccff; box-shadow: 0 0 12px #00ccff, 0 0 20px #0000ff; opacity: 1; }
        }

        @keyframes flow-2 {
            0%, 100% { background: #00ccff; box-shadow: 0 0 12px #00ccff, 0 0 20px #0000ff; opacity: 1; }
            33% { background: #ff0055; box-shadow: 0 0 12px #ff0055, 0 0 20px #ff0000; opacity: 1; }
            66% { background: #ffcc00; box-shadow: 0 0 12px #ffcc00, 0 0 20px #ffaa00; opacity: 1; }
        }

        @keyframes flow-3 {
            0%, 100% { background: #ffcc00; box-shadow: 0 0 12px #ffcc00, 0 0 20px #ffaa00; opacity: 1; }
            33% { background: #00ccff; box-shadow: 0 0 12px #00ccff, 0 0 20px #0000ff; opacity: 1; }
            66% { background: #ff0055; box-shadow: 0 0 12px #ff0055, 0 0 20px #ff0000; opacity: 1; }
        }

        /* --- Bulb Positions --- */
        .c1 { top: 31%; left: 50%; animation: flow-1 0.6s infinite; }
        .c2 { top: 32%; left: 55%; animation: flow-2 0.6s infinite; }
        .c3 { top: 35%; left: 59%; animation: flow-3 0.6s infinite; }
        .c4 { top: 39%; left: 62%; animation: flow-1 0.6s infinite; }
        .c5 { top: 44%; left: 63%; animation: flow-2 0.6s infinite; }
        .c6 { top: 49%; left: 62%; animation: flow-3 0.6s infinite; }
        .c7 { top: 53%; left: 59%; animation: flow-1 0.6s infinite; }
        .c8 { top: 55%; left: 55%; animation: flow-2 0.6s infinite; }
        .c9 { top: 56%; left: 50%; animation: flow-3 0.6s infinite; }
        .c10 { top: 55%; left: 45%; animation: flow-1 0.6s infinite; }
        .c11 { top: 53%; left: 41%; animation: flow-2 0.6s infinite; }
        .c12 { top: 49%; left: 38%; animation: flow-3 0.6s infinite; }
        .c13 { top: 44%; left: 37%; animation: flow-1 0.6s infinite; }
        .c14 { top: 39%; left: 38%; animation: flow-2 0.6s infinite; }
        .c15 { top: 35%; left: 41%; animation: flow-3 0.6s infinite; }
        .c16 { top: 32%; left: 45%; animation: flow-1 0.6s infinite; }

        /* Outer Frame Bulbs */
        .o1 { top: 3%; left: 50%; animation: flow-1 0.4s infinite; }
        .o2 { top: 5%; left: 42%; animation: flow-2 0.4s infinite; }
        .o3 { top: 5%; left: 58%; animation: flow-3 0.4s infinite; }
        .o4 { top: 9%; left: 34%; animation: flow-1 0.4s infinite; }
        .o5 { top: 9%; left: 66%; animation: flow-2 0.4s infinite; }
        .o6 { top: 15%; left: 26%; animation: flow-3 0.4s infinite; }
        .o7 { top: 15%; left: 74%; animation: flow-1 0.4s infinite; }
        .o8 { top: 23%; left: 19%; animation: flow-2 0.4s infinite; }
        .o9 { top: 23%; left: 81%; animation: flow-3 0.4s infinite; }
        .o10 { top: 33%; left: 14%; animation: flow-1 0.4s infinite; }
        .o11 { top: 33%; left: 86%; animation: flow-2 0.4s infinite; }
        .o12 { top: 44%; left: 11%; animation: flow-3 0.4s infinite; }
        .o13 { top: 44%; left: 89%; animation: flow-1 0.4s infinite; }
    </style>
</head>
<body>

    <h2>ඩිජිටල් වෙසක් තොරණ සන්දර්ශනය</h2>

    <div class="thorana-box">
        <!-- නිරපේක්ෂ මෙන්ම සාපේක්ෂ මාර්ග ද්විත්වයම භාවිතයෙන් නිවැරදිව පින්තූරය ඇතුලත් කිරීම -->
        <img src="./9352470180_1c03bb86dd_c_2.jpg" 
             onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/ytsonglk-arch/kdxthorana/main/9352470180_1c03bb86dd_c_2.jpg';" 
             alt="Vesak Thorana Image" class="thorana-bg">
        
        <!-- Center Loop Lights -->
        <div class="bulb c1"></div><div class="bulb c2"></div><div class="bulb c3"></div><div class="bulb c4"></div>
        <div class="bulb c5"></div><div class="bulb c6"></div><div class="bulb c7"></div><div class="bulb c8"></div>
        <div class="bulb c9"></div><div class="bulb c10"></div><div class="bulb c11"></div><div class="bulb c12"></div>
        <div class="bulb c13"></div><div class="bulb c14"></div><div class="bulb c15"></div><div class="bulb c16"></div>

        <!-- Outer Frame Lights -->
        <div class="bulb o1"></div><div class="bulb o2"></div><div class="bulb o3"></div><div class="bulb o4"></div>
        <div class="bulb o5"></div><div class="bulb o6"></div><div class="bulb o7"></div><div class="bulb o8"></div>
        <div class="bulb o9"></div><div class="bulb o10"></div><div class="bulb o11"></div><div class="bulb o12"></div>
        <div class="bulb o13"></div>
    </div>

</body>
</html>
